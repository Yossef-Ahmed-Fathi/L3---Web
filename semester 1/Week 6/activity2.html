<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <title>Signup Page Using Bootstrap</title>
    <style>
      .form-floating > .form-control {
        padding-left: 1.5rem !important;
      }

      .form-floating > label {
        left: 0.5rem !important;
      }

      .container {
        border: 1px solid black !important;
        border-left: 5px solid green !important;
      }
    </style>
  </head>

  <body>
    <form>
      <div class="container rounded p-3 mt-4">
        <h1 class="text-center mb-5">Signup</h1>
        <div class="row mb-3">
          <div class="col form-floating">
            <input
              type="text"
              name="fName"
              id="floatingfName"
              class="form-control"
              placeholder="First Name"
              required
            />

            <label for="floatingfName"
              >First Name <sup class="text-danger fw-bold">*</sup></label
            >
          </div>

          <div class="form-floating col">
            <input
              type="text"
              name="lName"
              id="floatingLname"
              class="form-control"
              placeholder="Last Name"
              required
            />

            <label for="floatingLname"
              >Last Name <sup class="text-danger fw-bold">*</sup></label
            >
          </div>
        </div>

        <div class="row mb-3">
          <div class="form-floating col">
            <input
              type="email"
              name="email"
              id="floatingEmail"
              placeholder="Email Address"
              class="form-control"
              required
            />

            <label for="floatingEmail"
              >Email Address <sup class="text-danger fw-bold">*</sup></label
            >
          </div>
        </div>

        <div class="row mb-3">
          <div class="form-floating col-6">
            <input
              type="password"
              name="NewPass"
              id="floatingNewPassword"
              class="form-control"
              placeholder="Create New Password"
              required
            />

            <label for="floatingNewPassword"
              >Create New Password
              <sup class="text-danger fw-bold">*</sup></label
            >
          </div>

          <div class="form-floating col-6">
            <input
              type="password"
              name="RePass"
              id="floatingRePassword"
              class="form-control"
              placeholder="Re-Write Password"
              required
            />

            <label for="floatingRePassword"
              >Re-Write Password <sup class="text-danger fw-bold">*</sup></label
            >
          </div>
        </div>

        <div class="row">
          <div class="form-floating col-12">
            <input
              type="tel"
              name="PhoneNum"
              id="floatingPhoneNum"
              class="form-control"
              placeholder="Phone Number"
              required
            />

            <label for="floatingPhoneNum"
              >Phone Number <sup class="text-danger fw-bold">*</sup></label
            >
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-12">
            <button type="submit" class="btn btn-outline-success w-100">
              Signup
            </button>
          </div>
        </div>
      </div>
    </form>
  </body>
</html>
