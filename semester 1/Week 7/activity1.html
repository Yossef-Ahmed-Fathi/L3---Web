<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>User Info Using JS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        body{
            font-family: poppins, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            align-items: center;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        h1{
            margin-top: 100px;
            margin-bottom: 150px;
        }
    </style>
</head>
<body>
        <h1>
            User Info
        </h1>

    <script>
        // Code Started and Asking User About his Information
        console.log('Code Started');
        alert('Welcome To User Info Page');
        let name = prompt('What is Your Name?');
        let raw_age = prompt('What is Your Age?');
        let confirmation = confirm('You Are Robot?');
        alert('Thanks to Fill Fields');

        // Numbering age String and Displaying Info In Console Log
        let age = Number(raw_age);
        console.log('Age Changed from String to Number, Age is: ' + age);
        console.log('-------------------------------------------------------------');
        console.log('Username : ' + name);
        console.log('User Age : ' + age);
        console.log('User Confirmation' + confirmation);


        // Displaying User Information In Page
        document.write('<div class="container shadow-lg rounded">');
        document.write('<h2>Username : ' + name + '</h2>')
        document.write('<h2>User Age : ' + age + '</h2>')
        document.write('<h2>Is User Robot : ' + confirmation + '</h2>')
        document.write('</div>')

        //Ending Code
        console.log('Code Ended');
        console.log('Developed by Yossef Ahmed');
    </script>
</body>
</html>
