<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS/colors.css" />
    <link rel="stylesheet" href="CSS/signup.css" />
    <title>GAMMAL DEV | Sign Up</title>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg bg-body-tertiary sticky-top"
      id="navbar-example2"
    >
      <div class="container-fluid">
        <a class="navbar-brand font-monospace" href="#hero">GAMMAL DEV</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div
            class="navbar-nav d-flex justify-content-end w-100 gap-3 mt-2 mt-lg-0"
          >
            <a class="nav-link active" aria-current="page" href="index.html"
              >Home</a
            >
            <a class="nav-link" href="about.html">About</a>
            <a class="nav-link" href="index.html#courses">Courses</a>
            <a class="nav-link" href="index.html#roadmap">Roadmap</a>
            <a class="nav-link" href="faq.html">FAQ</a>
          </div>
        </div>
      </div>
    </nav>
    <section id="signup">
      <h1>Signup</h1>
      <form>
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="floatingfName"
                placeholder="John"
                required
              />
              <label for="floatingfName">First Name</label>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="form-floating">
              <input
                type="text"
                class="form-control"
                id="floatinglName"
                placeholder="Doe"
                required
              />
              <label for="floatinglName">Last Name</label>
            </div>
          </div>
        </div>

        <div class="form-floating mb-3 mt-3">
          <input
            type="email"
            class="form-control"
            id="floatingInput"
            placeholder="name@example.com"
            required
          />
          <label for="floatingInput">Email address</label>
        </div>
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <div class="form-floating">
              <input
                type="password"
                class="form-control"
                id="floatingPassword"
                placeholder="Password"
                required
              />
              <label for="floatingPassword">Create Password</label>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="form-floating">
              <input
                type="password"
                class="form-control"
                id="floatingPassword2"
                placeholder="Password"
                required
              />
              <label for="floatingPassword2">Repeat Password</label>
            </div>
          </div>
        </div>
        <button
          onclick="
            event.preventDefault();
            alert('Signed up successfully! Redirecting to home page...');
            window.location.href = 'index';
          "
          class="btn-brand mt-3"
        >
          Sign Up
        </button>
      </form>
    </section>

    <footer class="site-footer mt-4 rounded-2">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-12 col-md-6 text-center text-md-start small">
            &copy; 2026 GAMMAL DEV. All rights reserved.
          </div>
          <div class="col-12 col-md-6 text-center text-md-end small">
            <a href="index.html" class="text-decoration-none text-reset me-2"
              >Home</a
            >
            <a href="about.html" class="text-decoration-none text-reset me-2"
              >About</a
            >
            <a href="faq.html" class="text-decoration-none text-reset">FAQ</a>
          </div>
        </div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
